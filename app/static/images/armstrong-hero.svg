<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2B3987;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#6918B1;stop-opacity:0.15"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="600" height="200" rx="20" fill="url(#grad1)"/>
  <!-- Decorative circles -->
  <circle cx="50" cy="100" r="60" fill="#2B3987" opacity="0.06"/>
  <circle cx="550" cy="100" r="80" fill="#6918B1" opacity="0.06"/>
  <circle cx="300" cy="30" r="40" fill="#FEF186" opacity="0.15"/>
  <!-- Number 153 breakdown -->
  <text x="300" y="65" text-anchor="middle" font-family="Poppins, sans-serif" font-size="28" font-weight="700" fill="#2B3987">153 = 1³ + 5³ + 3³</text>
  <!-- Step by step -->
  <text x="300" y="105" text-anchor="middle" font-family="Poppins, sans-serif" font-size="18" fill="#6918B1">1 + 125 + 27 = 153</text>
  <!-- Check mark -->
  <text x="300" y="145" text-anchor="middle" font-family="Poppins, sans-serif" font-size="16" fill="#8A4D01">✓ Armstrong Number Verified</text>
  <!-- Small decorative numbers -->
  <text x="80" y="50" font-family="Poppins, sans-serif" font-size="14" fill="#2B3987" opacity="0.2">370</text>
  <text x="500" y="45" font-family="Poppins, sans-serif" font-size="14" fill="#6918B1" opacity="0.2">9474</text>
  <text x="120" y="170" font-family="Poppins, sans-serif" font-size="14" fill="#6918B1" opacity="0.2">407</text>
  <text x="470" y="175" font-family="Poppins, sans-serif" font-size="14" fill="#2B3987" opacity="0.2">1634</text>
</svg>
