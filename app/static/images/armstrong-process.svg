<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 180">
  <defs>
    <linearGradient id="pbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2B3987;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#6918B1;stop-opacity:0.08"/>
    </linearGradient>
  </defs>
  <rect width="500" height="180" rx="16" fill="url(#pbg)"/>

  <!-- Step 1: Split -->
  <rect x="20" y="30" width="100" height="120" rx="12" fill="white" stroke="#2B3987" stroke-width="1.5"/>
  <circle cx="70" cy="55" r="15" fill="#2B3987"/>
  <text x="70" y="60" text-anchor="middle" font-family="Poppins, sans-serif" font-size="12" font-weight="700" fill="white">1</text>
  <text x="70" y="85" text-anchor="middle" font-family="Poppins, sans-serif" font-size="11" font-weight="600" fill="#2B3987">Split Digits</text>
  <text x="70" y="110" text-anchor="middle" font-family="Poppins, sans-serif" font-size="20" font-weight="700" fill="#2B3987">1 5 3</text>
  <text x="70" y="135" text-anchor="middle" font-family="Poppins, sans-serif" font-size="10" fill="#6918B1">3 digits</text>

  <!-- Arrow 1 -->
  <polygon points="130,90 145,80 145,85 165,85 165,95 145,95 145,100" fill="#FEF186" stroke="#8A4D01" stroke-width="1"/>

  <!-- Step 2: Power -->
  <rect x="175" y="30" width="100" height="120" rx="12" fill="white" stroke="#6918B1" stroke-width="1.5"/>
  <circle cx="225" cy="55" r="15" fill="#6918B1"/>
  <text x="225" y="60" text-anchor="middle" font-family="Poppins, sans-serif" font-size="12" font-weight="700" fill="white">2</text>
  <text x="225" y="85" text-anchor="middle" font-family="Poppins, sans-serif" font-size="11" font-weight="600" fill="#6918B1">Raise Power</text>
  <text x="225" y="110" text-anchor="middle" font-family="Poppins, sans-serif" font-size="14" font-weight="700" fill="#6918B1">1³ 5³ 3³</text>
  <text x="225" y="135" text-anchor="middle" font-family="Poppins, sans-serif" font-size="10" fill="#2B3987">1, 125, 27</text>

  <!-- Arrow 2 -->
  <polygon points="285,90 300,80 300,85 320,85 320,95 300,95 300,100" fill="#FEF186" stroke="#8A4D01" stroke-width="1"/>

  <!-- Step 3: Sum -->
  <rect x="330" y="30" width="100" height="120" rx="12" fill="white" stroke="#8A4D01" stroke-width="1.5"/>
  <circle cx="380" cy="55" r="15" fill="#8A4D01"/>
  <text x="380" y="60" text-anchor="middle" font-family="Poppins, sans-serif" font-size="12" font-weight="700" fill="white">3</text>
  <text x="380" y="85" text-anchor="middle" font-family="Poppins, sans-serif" font-size="11" font-weight="600" fill="#8A4D01">Add Them</text>
  <text x="380" y="110" text-anchor="middle" font-family="Poppins, sans-serif" font-size="14" font-weight="700" fill="#8A4D01">1+125+27</text>
  <text x="380" y="135" text-anchor="middle" font-family="Poppins, sans-serif" font-size="16" font-weight="700" fill="#2B3987">= 153 ✓</text>

</svg>
