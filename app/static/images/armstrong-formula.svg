<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f6fb"/>
      <stop offset="100%" style="stop-color:#ede9fe"/>
    </linearGradient>
  </defs>
  <rect width="500" height="300" rx="16" fill="url(#bg)"/>

  <!-- Title -->
  <text x="250" y="40" text-anchor="middle" font-family="Poppins, sans-serif" font-size="16" font-weight="600" fill="#2B3987">The Armstrong Formula</text>

  <!-- Formula box -->
  <rect x="50" y="55" width="400" height="50" rx="12" fill="white" stroke="#2B3987" stroke-width="2" opacity="0.8"/>
  <text x="250" y="87" text-anchor="middle" font-family="Poppins, sans-serif" font-size="20" font-weight="700" fill="#2B3987">
    d₁ⁿ + d₂ⁿ + ... + dₖⁿ = N
  </text>

  <!-- Examples -->
  <!-- 153 -->
  <rect x="30" y="125" width="140" height="80" rx="12" fill="white" stroke="#2B3987" stroke-width="1.5"/>
  <circle cx="100" cy="145" r="12" fill="#2B3987"/>
  <text x="100" y="150" text-anchor="middle" font-family="Poppins, sans-serif" font-size="12" font-weight="700" fill="white">3</text>
  <text x="100" y="170" text-anchor="middle" font-family="Poppins, sans-serif" font-size="14" font-weight="700" fill="#2B3987">153</text>
  <text x="100" y="192" text-anchor="middle" font-family="Poppins, sans-serif" font-size="11" fill="#6918B1">1³+5³+3³</text>

  <!-- 370 -->
  <rect x="180" y="125" width="140" height="80" rx="12" fill="white" stroke="#6918B1" stroke-width="1.5"/>
  <circle cx="250" cy="145" r="12" fill="#6918B1"/>
  <text x="250" y="150" text-anchor="middle" font-family="Poppins, sans-serif" font-size="12" font-weight="700" fill="white">3</text>
  <text x="250" y="170" text-anchor="middle" font-family="Poppins, sans-serif" font-size="14" font-weight="700" fill="#6918B1">370</text>
  <text x="250" y="192" text-anchor="middle" font-family="Poppins, sans-serif" font-size="11" fill="#2B3987">3³+7³+0³</text>

  <!-- 1634 -->
  <rect x="330" y="125" width="140" height="80" rx="12" fill="white" stroke="#8A4D01" stroke-width="1.5"/>
  <circle cx="400" cy="145" r="12" fill="#8A4D01"/>
  <text x="400" y="150" text-anchor="middle" font-family="Poppins, sans-serif" font-size="12" font-weight="700" fill="white">4</text>
  <text x="400" y="170" text-anchor="middle" font-family="Poppins, sans-serif" font-size="14" font-weight="700" fill="#8A4D01">1634</text>
  <text x="400" y="192" text-anchor="middle" font-family="Poppins, sans-serif" font-size="11" fill="#6918B1">1⁴+6⁴+3⁴+4⁴</text>

  <!-- Bottom note -->
  <text x="250" y="240" text-anchor="middle" font-family="Poppins, sans-serif" font-size="12" fill="#2B3987" opacity="0.6">n = number of digits</text>

  <!-- All armstrong numbers list -->
  <rect x="50" y="255" width="400" height="30" rx="8" fill="#FEF186" opacity="0.5"/>
  <text x="250" y="275" text-anchor="middle" font-family="Poppins, sans-serif" font-size="11" fill="#8A4D01">
    All 3-digit: 153, 370, 371, 407 | 4-digit: 1634, 8208, 9474
  </text>
</svg>
