{% extends "base.html" %}
{% block title %}Login - Armstrong Number App{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
            <div style="background: var(--primary-light); width: 70px; height: 70px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center;">
                <i class="fas fa-sign-in-alt fa-2x" style="color: var(--primary);"></i>
            </div>
            <h2 class="fw-bold mt-3" style="color: var(--primary);">Welcome Back</h2>
            <p class="text-muted">Sign in to your account</p>
        </div>

        <div class="card">
            <div class="card-body p-4">
                <form method="POST">

                    {% if errors and errors.get('general') %}
                    <div class="alert alert-danger">
                        {{ errors.get('general') }}
                    </div>
                    {% endif %}

                    <div class="mb-3">
                        <label for="username" class="form-label">
                            <i class="fas fa-user me-1" style="color: var(--accent);"></i> Username
                        </label>
                        <input type="text" class="form-control" id="username" name="username"
                               placeholder="Enter your username" value="{{ username or '' }}" required autofocus>
                    </div>
                    <div class="mb-4">
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <label for="password" class="form-label mb-0">
                                <i class="fas fa-lock me-1" style="color: var(--accent);"></i> Password
                            </label>
                            <a href="{{ url_for('main.forgot_password') }}" class="small" style="color: var(--accent);">
                                Forgot password?
                            </a>
                        </div>
                        <input type="password" class="form-control" id="password" name="password"
                               placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">
                        <i class="fas fa-arrow-right me-2"></i>Log In
                    </button>
                </form>
            </div>
        </div>

        <p class="mt-4 text-center text-muted">
            Don't have an account?
            <a href="{{ url_for('main.register') }}" class="fw-bold" style="color: var(--accent);">
                Create one <i class="fas fa-arrow-right ms-1" style="font-size: 0.8rem;"></i>
            </a>
        </p>
    </div>
</div>
{% endblock %}
