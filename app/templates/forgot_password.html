{% extends "base.html" %}
{% block title %}Forgot Password - Armstrong Number App{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
            <div style="background: var(--accent-light); width: 70px; height: 70px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center;">
                <i class="fas fa-lock fa-2x" style="color: var(--accent);"></i>
            </div>
            <h2 class="fw-bold mt-3" style="color: var(--primary);">Forgot Password?</h2>
            <p class="text-muted">No worries — enter your email and we'll send you a reset link.</p>
        </div>

        <div class="card">
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-4">
                        <label for="email" class="form-label">
                            <i class="fas fa-envelope me-1" style="color: var(--accent);"></i> Email Address
                        </label>
                        <input type="email" class="form-control" id="email" name="email"
                               placeholder="Enter your registered email" required autofocus>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">
                        <i class="fas fa-paper-plane me-2"></i>Send Reset Link
                    </button>
                </form>
            </div>
        </div>

        <p class="mt-4 text-center">
            <a href="{{ url_for('main.login') }}" style="color: var(--accent);">
                <i class="fas fa-arrow-left me-1"></i> Back to login
            </a>
        </p>
    </div>
</div>
{% endblock %}
