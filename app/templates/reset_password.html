{% extends "base.html" %}
{% block title %}Reset Password - Armstrong Number App{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
            <div style="background: var(--primary-light); width: 70px; height: 70px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center;">
                <i class="fas fa-key fa-2x" style="color: var(--primary);"></i>
            </div>
            <h2 class="fw-bold mt-3" style="color: var(--primary);">New Password</h2>
            <p class="text-muted">Choose a strong password for your account</p>
        </div>

        <div class="card">
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('main.reset_password', token=token) }}">
                    <div class="mb-3">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock me-1" style="color: var(--accent);"></i> New Password
                        </label>
                        <input type="password" class="form-control" id="password" name="password"
                               placeholder="Min. 6 characters" minlength="6" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label for="confirm_password" class="form-label">
                            <i class="fas fa-lock me-1" style="color: var(--accent);"></i> Confirm Password
                        </label>
                        <input type="password" class="form-control" id="confirm_password"
                               name="confirm_password" placeholder="Repeat your password" minlength="6" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">
                        <i class="fas fa-check me-2"></i>Reset Password
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
