<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Poppins', Arial, sans-serif; background: #f5f6fb; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; border-radius: 16px; padding: 40px; }
        .btn { display: inline-block; background: linear-gradient(135deg, #2B3987, #6918B1); color: white; text-decoration: none; padding: 14px 32px; border-radius: 10px; font-weight: 600; }
        h1 { color: #2B3987; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Verify Your Email</h1>
        <p>Hi <strong>{{ user.name }}</strong>,</p>
        <p>Thanks for signing up for Armstrong Number App! Click the button below to verify your email address:</p>
        <p style="text-align: center; margin: 30px 0;">
            <a href="{{ verify_url }}" class="btn">Verify Email</a>
        </p>
        <p style="font-size: 13px; color: #888;">This link expires in 1 hour. If you didn't create this account, you can ignore this email.</p>
    </div>
</body>
</html>
