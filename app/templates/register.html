{% extends "base.html" %}
{% block title %}Register - Armstrong Number App{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="text-center mb-4">
            <div style="background: var(--accent-light); width: 70px; height: 70px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center;">
                <i class="fas fa-user-plus fa-2x" style="color: var(--accent);"></i>
            </div>
            <h2 class="fw-bold mt-3" style="color: var(--primary);">Create Account</h2>
            <p class="text-muted">Join us and explore Armstrong numbers</p>
        </div>

        <div class="card">
            <div class="card-body p-4">
                <form method="POST" id="registerForm">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="name" class="form-label">
                                <i class="fas fa-id-card me-1" style="color: var(--accent);"></i> Full Name
                            </label>
                            <input type="text" class="form-control" id="name" name="name"
                                   placeholder="John Doe" required>
                        </div>
                        <div class="col-md-6">
                            <label for="username" class="form-label">
                                <i class="fas fa-at me-1" style="color: var(--accent);"></i> Username
                            </label>
                            <input type="text" class="form-control" id="username" name="username"
                                   placeholder="johndoe" required>
                        </div>
                    </div>

                    <div class="row g-3 mt-1">
                        <div class="col-md-6">
                            <label for="email" class="form-label">
                                <i class="fas fa-envelope me-1" style="color: var(--accent);"></i> Email
                            </label>
                            <input type="email" class="form-control" id="email" name="email"
                                   placeholder="john@example.com" required>
                            <div class="invalid-feedback">Please enter a valid email address.</div>
                        </div>
                        <div class="col-md-6">
                            <label for="contact_number" class="form-label">
                                <i class="fas fa-phone me-1" style="color: var(--accent);"></i> Phone
                            </label>
                            <input type="tel" class="form-control" id="contact_number" name="contact_number"
                                   placeholder="+234 800 000 0000" required>
                        </div>
                    </div>

                    <div class="row g-3 mt-1">
                        <div class="col-md-6">
                            <label for="password" class="form-label">
                                <i class="fas fa-lock me-1" style="color: var(--accent);"></i> Password
                            </label>
                            <input type="password" class="form-control" id="password" name="password"
                                   placeholder="Min. 6 characters" minlength="6" required>
                        </div>
                        <div class="col-md-6">
                            <label for="confirm_password" class="form-label">
                                <i class="fas fa-lock me-1" style="color: var(--accent);"></i> Confirm
                            </label>
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                                   placeholder="Repeat password" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2 mt-4">
                        <i class="fas fa-user-plus me-2"></i>Create Account
                    </button>
                </form>
            </div>
        </div>

        <p class="mt-4 text-center text-muted">
            Already have an account?
            <a href="{{ url_for('main.login') }}" class="fw-bold" style="color: var(--accent);">
                Log in <i class="fas fa-arrow-right ms-1" style="font-size: 0.8rem;"></i>
            </a>
        </p>
    </div>
</div>

<script>
document.getElementById('registerForm').addEventListener('submit', function(e) {
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm_password').value;
    const email = document.getElementById('email');

    if (password !== confirm) {
        e.preventDefault();
        alert('Passwords do not match.');
        return;
    }

    if (!email.value.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) {
        e.preventDefault();
        email.classList.add('is-invalid');
        return;
    }
});
</script>
{% endblock %}
